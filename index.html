<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Akshat Shukla — Data Engineer · AI Builder</title>
  <meta name="description" content="Building cities powered by data. An interactive data city portfolio — Databricks, Snowflake, AI agents, and the platforms in between." />
  <meta name="author" content="Akshat Shukla" />
  <meta name="theme-color" content="#06070f" />

  <!-- Open Graph (LinkedIn, Slack, iMessage previews) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Data City" />
  <meta property="og:title" content="Akshat Shukla — Data Engineer · AI Builder" />
  <meta property="og:description" content="Building cities powered by data. An interactive data-engineer portfolio rendered as a futuristic city." />
  <meta property="og:url" content="https://data-city.vercel.app/" />
  <meta property="og:image" content="https://data-city.vercel.app/assets/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="An isometric neon data city skyline above the name Akshat Shukla, Data Engineer · AI Builder." />

  <!-- Twitter / X cards -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Akshat Shukla — Data Engineer · AI Builder" />
  <meta name="twitter:description" content="Building cities powered by data. An interactive data-engineer portfolio rendered as a futuristic city." />
  <meta name="twitter:image" content="https://data-city.vercel.app/assets/og.png" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='12' height='12' x='2' y='2' rx='3' fill='%237fe0ff'/%3E%3C/svg%3E" />
  <link rel="canonical" href="https://data-city.vercel.app/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ambient backdrop -->
  <div class="bg-grad"></div>
  <div class="bg-glow"></div>

  <!-- the city canvas -->
  <canvas id="city" aria-label="Interactive data city"></canvas>

  <!-- hover tooltip -->
  <div id="tip" class="tip" role="status"></div>

  <!-- top bar -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <span class="brand-name">AKSHAT&nbsp;SHUKLA</span>
    </div>
    <div class="topbar-meta">DATA&nbsp;CITY · v1.0</div>
  </header>

  <!-- district rail -->
  <nav id="rail" class="rail" aria-label="Districts"></nav>
  <button id="rail-toggle" class="rail-toggle" aria-label="Toggle district panel" title="Hide / show districts">
    <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none">
      <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <!-- ground hint -->
  <div class="ground-hint" aria-hidden="true">
    <span>Drag to explore · scroll to zoom · click a district</span>
  </div>

  <!-- hero overlay -->
  <section id="hero" class="hero">
    <div class="hero-inner">
      <div class="hero-eyebrow">
        <span class="pulse-dot"></span> SYSTEM ONLINE — RENDERING INFRASTRUCTURE
      </div>
      <h1 id="hero-name" class="hero-name"></h1>
      <div id="hero-role" class="hero-role"></div>
      <p id="hero-tag" class="hero-tag"></p>
      <button id="enter" class="enter-btn">
        <span>Enter the city</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="hero-foot">Six districts · one engineer · built from data infrastructure</div>
    </div>
  </section>

  <!-- detail panel -->
  <div id="scrim" class="scrim"></div>
  <aside id="panel" class="panel" aria-label="District detail">
    <button id="panel-close" class="panel-close" aria-label="Close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="panel-body" class="panel-body"></div>
  </aside>

  <!-- contact strip -->
  <footer class="contact">
    <span class="contact-tag">Let's build something</span>
    <nav id="contact-links" class="contact-links"></nav>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/city.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
