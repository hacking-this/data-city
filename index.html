<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Akshat Shukla — Data Engineer · AI Builder</title>
  <meta name="description" content="The digital infrastructure of a data engineer, explored as a futuristic city." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ambient backdrop -->
  <div class="bg-grad"></div>
  <div class="bg-glow"></div>

  <!-- the city canvas -->
  <canvas id="city" aria-label="Interactive data city"></canvas>

  <!-- hover tooltip -->
  <div id="tip" class="tip" role="status"></div>

  <!-- top bar -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <span class="brand-name">AKSHAT&nbsp;SHUKLA</span>
    </div>
    <div class="topbar-meta">DATA&nbsp;CITY · v1.0</div>
  </header>

  <!-- district rail -->
  <nav id="rail" class="rail" aria-label="Districts"></nav>
  <button id="rail-toggle" class="rail-toggle" aria-label="Toggle district panel" title="Hide / show districts">
    <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none">
      <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <!-- ground hint -->
  <div class="ground-hint" aria-hidden="true">
    <span>Drag to explore · scroll to zoom · click a district</span>
  </div>

  <!-- hero overlay -->
  <section id="hero" class="hero">
    <div class="hero-inner">
      <div class="hero-eyebrow">
        <span class="pulse-dot"></span> SYSTEM ONLINE — RENDERING INFRASTRUCTURE
      </div>
      <h1 id="hero-name" class="hero-name"></h1>
      <div id="hero-role" class="hero-role"></div>
      <p id="hero-tag" class="hero-tag"></p>
      <button id="enter" class="enter-btn">
        <span>Enter the city</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="hero-foot">Six districts · one engineer · built from data infrastructure</div>
    </div>
  </section>

  <!-- detail panel -->
  <div id="scrim" class="scrim"></div>
  <aside id="panel" class="panel" aria-label="District detail">
    <button id="panel-close" class="panel-close" aria-label="Close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="panel-body" class="panel-body"></div>
  </aside>

  <!-- contact strip -->
  <footer class="contact">
    <span class="contact-tag">Let's build something</span>
    <nav id="contact-links" class="contact-links"></nav>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/city.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
